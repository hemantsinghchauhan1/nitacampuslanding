<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Circle Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="50%" stop-color="#0044E6"/>
      <stop offset="100%" stop-color="#0022B8"/>
    </linearGradient>

    <!-- Outer Rim Light Gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D94FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#001F99" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Subtle Drop Shadow for 3D depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#001155" flood-opacity="0.35"/>
    </filter>

    <filter id="nShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#001866" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main Circular Badge -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" filter="url(#dropShadow)"/>
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#rimGrad)" stroke-width="4"/>

  <!-- Bold White 'N' Icon -->
  <g filter="url(#nShadow)">
    <path d="M 175 130 
             C 192 130, 205 143, 205 160 
             L 205 270 
             L 307 142 
             C 314 134, 325 130, 335 130 
             C 353 130, 367 144, 367 162 
             L 367 342 
             C 367 359, 354 372, 337 372 
             C 320 372, 307 359, 307 342 
             L 307 232 
             L 205 360 
             C 198 368, 187 372, 177 372 
             C 159 372, 145 358, 145 340 
             L 145 160 
             C 145 143, 158 130, 175 130 Z" 
          fill="#FFFFFF"/>
  </g>

  <!-- NITACAMPUS Typography -->
  <text x="256" y="420" 
        text-anchor="middle" 
        font-family="'Inter', -apple-system, sans-serif" 
        font-weight="800" 
        font-size="34" 
        letter-spacing="2">
    <tspan fill="#FFFFFF">NITA</tspan><tspan fill="#38BDF8">CAMPUS</tspan>
  </text>

  <!-- Underline Accent -->
  <rect x="206" y="434" width="100" height="4" rx="2" fill="#38BDF8"/>
</svg>