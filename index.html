<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NITACAMPUS - Live Launch</title>
    <meta
      name="description"
      content="Official 21-day live launch countdown for NITACAMPUS - NIT Agartala Campus Super App."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- BACKGROUND AUDIO -->
    <audio id="bg-audio" loop preload="auto">
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
    </audio>

    <!-- FULLSCREEN CAMPUS BACKGROUND IMAGE + DARK OVERLAY -->
    <div class="hero-bg-image"></div>
    <div class="hero-bg-overlay"></div>
    <div class="bg-grid-overlay"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- SINGLE-SCREEN VIEWPORT CONTAINER -->
    <main class="single-viewport-container">
      <section class="main-card-3d">
        <div class="card-glass-panel">
          <!-- TOP EYEBROW BADGE -->
          <div class="top-tag-row">
            <div class="top-tag">
              <span class="pulse-dot"></span>
              <span>NITACAMPUS • 21-DAY LIVE LAUNCH</span>
            </div>
            
            <!-- INSTAGRAM BADGE LINK -->
            <a href="https://instagram.com/nita_campus" target="_blank" rel="noopener noreferrer" class="insta-link-badge">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
              <span>@nita_campus</span>
            </a>
          </div>

          <!-- HEADLINE -->
          <h1 class="main-headline">
            Going <span class="text-gradient">live</span> in
          </h1>

          <!-- 3D COUNTDOWN CARDS GRID -->
          <div class="countdown-grid">
            <!-- DAYS -->
            <div class="card-unit">
              <div class="card-3d" data-tilt>
                <div class="card-top-shade"></div>
                <span id="days-digit" class="digit">00</span>
                <div class="card-hover-glow"></div>
              </div>
              <span class="unit-label">DAYS</span>
            </div>

            <div class="colon-sep">:</div>

            <!-- HOURS -->
            <div class="card-unit">
              <div class="card-3d" data-tilt>
                <div class="card-top-shade"></div>
                <span id="hours-digit" class="digit">00</span>
                <div class="card-hover-glow"></div>
              </div>
              <span class="unit-label">HOURS</span>
            </div>

            <div class="colon-sep">:</div>

            <!-- MINS -->
            <div class="card-unit">
              <div class="card-3d" data-tilt>
                <div class="card-top-shade"></div>
                <span id="mins-digit" class="digit">00</span>
                <div class="card-hover-glow"></div>
              </div>
              <span class="unit-label">MINUTES</span>
            </div>

            <div class="colon-sep">:</div>

            <!-- SECS -->
            <div class="card-unit">
              <div class="card-3d" data-tilt>
                <div class="card-top-shade"></div>
                <span id="secs-digit" class="digit">00</span>
                <div class="card-hover-glow"></div>
              </div>
              <span class="unit-label">SECONDS</span>
            </div>
          </div>

          <!-- PROGRESS BAR SECTION -->
          <div class="progress-container">
            <div class="progress-meta">
              <span>0% complete</span>
              <span id="pct-label">0% complete</span>
            </div>
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <!-- FEATURE REQUEST FORM ONLY -->
          <div class="feature-section-wrapper">
            <h3 class="feature-section-title">💡 Have a feature idea for NITACAMPUS?</h3>
            <form id="feature-form" class="feature-form">
              <div class="feature-form-inner">
                <input type="email" id="feature-email" name="email" placeholder="Your email address..." required class="feature-input" />
                <textarea id="feature-text" name="requested_features" placeholder="Any feature you want? Just message it here... (e.g. PYQs, Attendance Manager, Hostel Gate Pass, Canteen ordering...)" required class="feature-textarea" rows="2"></textarea>
                <button type="submit" id="feature-submit-btn" class="feature-btn">
                  <span>SEND FEATURE SUGGESTION</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                  </svg>
                </button>
              </div>
            </form>

            <div id="notify-msg" class="notify-success-msg" style="display: none;">
              ✨ Feature request submitted! Sent to team.
            </div>
          </div>

          <!-- BOTTOM STATUS & SOCIAL ROW -->
          <div class="bottom-status-row">
            <div class="status-pill">
              <span class="status-dot"></span>
              <span>Building in progress — NIT Agartala Campus App</span>
            </div>

            <a href="https://instagram.com/nita_campus" target="_blank" rel="noopener noreferrer" class="footer-insta-link">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
              <span>Follow @nita_campus</span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <!-- FLOATING 3D AUDIO CONTROL FAB -->
    <div class="audio-fab" id="audio-fab" title="Click anywhere to play background music">
      <button id="audio-toggle-btn" class="audio-btn" aria-label="Toggle Audio">
        <span class="music-icon" id="music-icon">🎵</span>
        <div class="sound-wave" id="sound-wave">
          <span></span><span></span><span></span>
        </div>
      </button>
      <span class="audio-tooltip" id="audio-tooltip">Click to play sound</span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
